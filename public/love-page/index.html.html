<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message For You</title>
    <style>
        :root {
            --primary: #ff4b6e;
            --secondary: #ffccd5;
            --bg: #1a1a1a;
            --heart-color: #ff2d55;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            perspective: 1500px;
        }

        /* Background Hearts */
        .bg-hearts { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .floating-heart { position: absolute; color: rgba(255, 75, 110, 0.3); animation: float 6s linear infinite; bottom: -50px; }
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }

        /* Container & Transitions */
        .card-wrapper { position: relative; width: 450px; max-width: 95%; height: 550px; display: flex; justify-content: center; align-items: center; }
        .container {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%; text-align: center;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .unbox-lid { transform: translateY(-130%) rotateX(100deg); opacity: 0; pointer-events: none; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        .btn {
            background: var(--primary);
            color: white; border: none;
            padding: 12px 30px; font-size: 1.1rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 75, 110, 0.3);
            transition: all 0.3s ease;
        }
        .btn:hover { background: #ff2d55; transform: scale(1.1); }
        .btn-no { background: #555; box-shadow: none; }
        .btn-no:hover { background: #333; }

        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* 3D Heart */
        .heart-3d-scene { position: relative; width: 80px; height: 80px; margin: 20px auto 40px; transform-style: preserve-3d; animation: spin3D 8s linear infinite; }
        @keyframes spin3D { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .heart-3d { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; }
        .heart-piece { position: absolute; width: 80px; height: 80px; background: var(--heart-color); border-radius: 50% 50% 0 0; }
        .heart-piece.front { transform: translateZ(5px); }
        .heart-piece.back { transform: rotateY(180deg) translateZ(5px); background: #e6264b; }
        .heart-piece::after { content: ''; position: absolute; width: 80px; height: 80px; background: inherit; border-radius: 50% 50% 0 0; transform: rotate(-45deg); }

        /* Reveal Logic */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Confetti */
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 100; animation: confettiFall 3s linear forwards; }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
      <source src="Sorry Is Overrated, Just Say   Abhi Na Jao Chhod Kar  Cinematic Night Drive  #shorts.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-hearts" id="heart-bg"></div>

    <div class="card-wrapper">
        <div id="page1" class="container">
            <div style="font-size: 4rem; margin-bottom: 20px;">🎁</div>
            <h1>A Little Gift...</h1>
            <p>I put my heart in this box. Will you open it?</p>
            <button class="btn pulse" onclick="startUnboxing()">Unbox Now</button>
        </div>

        <div id="page2" class="container hidden">
            <div class="heart-3d-scene">
                <div class="heart-3d">
                    <div class="heart-piece front"></div>
                    <div class="heart-piece back"></div>
                </div>
            </div>
            <h1 id="title"></h1>
            <p id="quote" style="min-height: 80px;"></p>
            <div class="btn-group hidden" id="action-btns">
                <button class="btn" onclick="goToPage(3)">Yes</button>
                <button class="btn btn-no" onclick="goToPage(4)">No</button>
            </div>
        </div>

        <div id="page3" class="container hidden">
            <div style="font-size: 5rem; margin-bottom: 10px;">💖</div>
            <h1>Thank You!</h1>
            <p>"Thank you for forgiving me. You have no idea how much this means to me."</p>
            <button class="btn" onclick="location.reload()" style="margin-top: 20px;">Start Over</button>
        </div>

        <div id="page4" class="container hidden">
            <div style="font-size: 5rem; margin-bottom: 10px;">😔</div>
            <h1>I Understand...</h1>
            <p>"Still sorry for everything. I'll always be here."</p>
            <button class="btn btn-no" onclick="location.reload()" style="margin-top: 20px;">Try Again</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");

        function createHearts() {
            const bg = document.getElementById('heart-bg');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 5 + 's';
                bg.appendChild(heart);
            }
        }
        createHearts();

        function throwConfetti() {
            for (let i = 0; i < 80; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#ff4b6e', '#FFD700', '#fff'][Math.floor(Math.random()*3)];
                conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }
        }

        function startUnboxing() {
            // Trigger song play on user interaction
            audio.play().catch(e => console.log("Play blocked"));

            document.getElementById('page1').classList.add('unbox-lid');
            setTimeout(() => {
                document.getElementById('page1').classList.add('hidden');
                document.getElementById('page2').classList.remove('hidden');
                document.getElementById('page2').classList.add('fade-in');
                startTyping();
            }, 600);
        }

        function startTyping() {
            let i = 0, j = 0;
            const titleTxt = "Bura Na Mano...";
            const quoteTxt = "Abhi na jao chhod kar, ke dil abhi bhara nahi... I know I messed up. Will you forgive me?";
            
            function typeTitle() {
                if (i < titleTxt.length) {
                    document.getElementById("title").innerHTML += titleTxt.charAt(i++);
                    setTimeout(typeTitle, 60);
                } else { typeQuote(); }
            }
            function typeQuote() {
                if (j < quoteTxt.length) {
                    document.getElementById("quote").innerHTML += quoteTxt.charAt(j++);
                    setTimeout(typeQuote, 35);
                } else {
                    document.getElementById('action-btns').classList.remove('hidden');
                    document.getElementById('action-btns').classList.add('fade-in');
                }
            }
            typeTitle();
        }

        function goToPage(pageNum) {
            document.getElementById('page2').classList.add('hidden');
            const newPage = document.getElementById('page' + pageNum);
            newPage.classList.remove('hidden');
            newPage.classList.add('fade-in');
            if(pageNum === 3) throwConfetti();
        }
    </script>
</body>
</html>
